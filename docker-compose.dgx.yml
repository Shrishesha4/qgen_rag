# DGX Spark Deployment Guide
# NVIDIA DGX Spark optimized deployment for QGen RAG system

version: '3.8'

services:
  # PostgreSQL with pgvector for embeddings and training data
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qgen_postgres
    environment:
      POSTGRES_DB: qgen_rag
      POSTGRES_USER: qgen_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qgen_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    networks:
      - qgen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qgen_user -d qgen_rag"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: qgen_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - qgen_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API with GPU support
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dgx
    container_name: qgen_backend
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://qgen_user:${POSTGRES_PASSWORD:-qgen_password}@postgres:5432/qgen_rag
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      
      # Model Configuration
      LOCAL_MODEL_PATH: ${LOCAL_MODEL_PATH:-deepseek-ai/DeepSeek-R1-Distill-Llama-8B}
      MODEL_CACHE_DIR: /app/models
      LORA_ADAPTERS_DIR: /app/lora_adapters
      TRAINING_DATA_DIR: /app/training_data
      
      # GPU Optimization
      CUDA_VISIBLE_DEVICES: 0,1,2,3
      USE_FLASH_ATTN: true
      USE_4BIT: true
      MAX_NEW_TOKENS: 2048
      BATCH_SIZE: 4
      MAX_BATCH_SIZE: 8
      
      # External APIs
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      
      # Security
      SECRET_KEY: ${SECRET_KEY}
      
      # Performance
      WORKERS: 4
      MAX_CONNECTIONS: 100
      
      # Training
      TRAINING_BASE_MODEL: ${TRAINING_BASE_MODEL:-deepseek-ai/DeepSeek-R1-Distill-Llama-8B}
      PROMOTION_MIN_OFFLINE_PASS_RATE: 0.85
      PROMOTION_MAX_P95_LATENCY_MS: 3000
      PROMOTION_MAX_TIMEOUT_RATE: 0.05
      
    volumes:
      - ./models:/app/models
      - ./lora_adapters:/app/lora_adapters
      - ./training_data:/app/training_data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - qgen_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Training Worker (separate for intensive training tasks)
  training_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dgx
    container_name: qgen_training
    command: ["python", "-m", "app.workers.runner"]
    environment:
      DATABASE_URL: postgresql+asyncpg://qgen_user:${POSTGRES_PASSWORD:-qgen_password}@postgres:5432/qgen_rag
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      
      # Training Configuration
      LOCAL_MODEL_PATH: ${LOCAL_MODEL_PATH:-deepseek-ai/DeepSeek-R1-Distill-Llama-8B}
      MODEL_CACHE_DIR: /app/models
      LORA_ADAPTERS_DIR: /app/lora_adapters
      TRAINING_DATA_DIR: /app/training_data
      
      # GPU for training
      CUDA_VISIBLE_DEVICES: 0,1,2,3
      USE_FLASH_ATTN: true
      USE_4BIT: true
      
      # Training Hyperparameters
      LEARNING_RATE: 2e-4
      BATCH_SIZE: 2
      GRADIENT_ACCUMULATION_STEPS: 8
      LORA_R: 16
      LORA_ALPHA: 32
      NUM_EPOCHS: 3
      
    volumes:
      - ./models:/app/models
      - ./lora_adapters:/app/lora_adapters
      - ./training_data:/app/training_data
      - ./logs:/app/logs
    networks:
      - qgen_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Frontend (SvelteKit)
  frontend:
    build:
      context: ./trainer-web
      dockerfile: Dockerfile
    container_name: qgen_frontend
    environment:
      PUBLIC_API_URL: http://localhost:8000
      PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "5173:5173"
    networks:
      - qgen_network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: qgen_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    ports:
      - "80:80"
      - "443:443"
    networks:
      - qgen_network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: qgen_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - qgen_network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: qgen_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - qgen_network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  qgen_network:
    driver: bridge
